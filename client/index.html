<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-container" class="container">
    <h2>Login to AI Chat</h2>
    <div class="form-group">
        <label for="username">Username:</label>
        <input type="text" id="username" placeholder="Enter username (admin)">
    </div>
    <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Enter password (admin123)">
    </div>
    <button onclick="login()">Login</button>
    <p id="login-error" style="color: red; display: none;"></p>
</div>

<div id="chat-container" class="container" style="display: none;">
    <div class="header">
        <h2>AI Chat</h2>
        <button onclick="logout()">Logout</button>
    </div>
    <div class="chat-layout">
        <div class="history-sidebar">
            <h3>History</h3>
            <button onclick="newChat()" class="new-chat-btn">New Chat</button>
            <button onclick="fetchHistory()" class="refresh-btn">Refresh History</button>
            <div id="history-list"></div>
        </div>
        <div class="chat-main">
            <div id="chat-box" class="chat-box"></div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Type your message to AI..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()" id="send-btn">Send</button>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
